<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Now List</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">Now List</div>
      <ul class="file-list" id="file-list"></ul>
    </aside>
    <main class="main" id="main">
      <div class="empty-state" id="empty-state">
        <p>No lists found in <code>~/.now-list/</code></p>
        <p>Ask Claude to write a todo JSON file there.</p>
      </div>
      <div class="todo-content" id="todo-content" style="display:none">
        <h1 id="todo-title"></h1>
        <div id="groups-container"></div>
      </div>
    </main>
    <aside class="detail-panel" id="detail-panel">
      <div class="detail-panel-header">
        <span class="detail-panel-title">Details</span>
        <button class="detail-close-btn" id="detail-close">✕</button>
      </div>
      <div class="detail-body" id="detail-body"></div>
    </aside>
  </div>
  <script src="app.js"></script>
</body>
</html>
